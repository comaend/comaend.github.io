<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GameZone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f0f1a;color:#e8e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#16162a;border-bottom:1px solid #2a2a45;padding:0 14px;display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0}
.logo{font-size:20px;font-weight:900;color:#f60}
.sb{flex:1;max-width:260px;background:#0f0f1a;border:1px solid #2a2a45;border-radius:20px;display:flex;align-items:center;padding:0 10px;gap:6px;height:34px}
.sb input{background:transparent;border:none;outline:none;color:#e8e8f0;font-size:13px;width:100%}
.sb input::placeholder{color:#555}
.btn-add{background:#f60;border:none;color:#fff;font-size:12px;font-weight:800;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap}
.btn-profile{background:#2a2a45;border:none;color:#e8e8f0;font-size:12px;font-weight:800;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;margin-left:auto;transition:background .15s}
.btn-profile:hover{background:#3a3a60;color:#f60}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:170px;flex-shrink:0;background:#16162a;border-right:1px solid #2a2a45;overflow-y:auto;padding:8px}
.clbl{font-size:10px;font-weight:800;color:#555;text-transform:uppercase;letter-spacing:.5px;padding:10px 8px 4px}
.cbtn{display:flex;align-items:center;gap:7px;width:100%;background:transparent;border:none;color:#8888aa;font-size:12px;font-weight:700;padding:7px 10px;border-radius:8px;cursor:pointer;text-align:left}
.cbtn:hover{background:#1e1e38;color:#e8e8f0}
.cbtn.active{background:#2a2a45;color:#f60}
.content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
.player{background:#16162a;border:1px solid #2a2a45;border-radius:10px;overflow:hidden;display:none}
.player.on{display:block}
.pbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#0f0f1a;border-bottom:1px solid #2a2a45}
.pname{font-size:13px;font-weight:800;color:#f60}
.pcls{background:#2a2a45;border:none;color:#aaa;font-size:11px;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer;margin-left:auto}
iframe{width:100%;height:420px;border:none;background:#000;display:block}
.pfull{background:#2a2a45;border:none;color:#aaa;font-size:11px;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer;transition:background .15s}
.pfull:hover{background:#3a3a60;color:#f60}
#fsOverlay{display:none;position:fixed;inset:0;background:#000;z-index:9999;flex-direction:column}
#fsOverlay.open{display:flex}
#fsBar{background:#0f0f1a;border-bottom:1px solid #2a2a45;padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#fsEmoji{font-size:18px}
#fsTitle{font-size:13px;font-weight:800;color:#f60}
#fsClose{background:#2a2a45;border:none;color:#aaa;font-size:12px;font-weight:700;padding:5px 12px;border-radius:7px;cursor:pointer;margin-left:auto}
#fsClose:hover{background:#f60;color:#fff}
#fsFrame{flex:1;width:100%;border:none;background:#000}
.ghdr{display:flex;align-items:center;justify-content:space-between}
.gtitle{font-size:14px;font-weight:800;color:#fff}
.gbadge{font-size:10px;font-weight:800;background:#f60;color:#fff;padding:2px 8px;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.card{background:#1e1e38;border:1.5px solid #2a2a45;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.card:hover{transform:translateY(-2px);border-color:#5a5a88}
.card.playing{border-color:#f60;border-width:2px}
.thumb{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:38px;position:relative}
.pov{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.card:hover .pov{opacity:1}
.pc{width:36px;height:36px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pc::after{content:'';width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:12px solid #111;margin-left:3px}
.gi{padding:7px 8px 8px}
.gn{font-size:11px;font-weight:700;color:#e8e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.gm{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#555}
.stars{color:#ffd700}
.tag{position:absolute;top:6px;left:6px;font-size:9px;font-weight:800;padding:2px 5px;border-radius:5px;text-transform:uppercase}
.tag-hot{background:#f43f5e;color:#fff}.tag-new{background:#22d3ee;color:#111}.tag-top{background:#ffd700;color:#111}
.dbtn{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.75);border:none;color:#f43f5e;width:20px;height:20px;border-radius:5px;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center;font-weight:900}
.card:hover .dbtn{display:flex}
.empty{text-align:center;padding:40px 20px;color:#555;font-size:14px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.overlay.open{display:flex}
.modal{background:#16162a;border:1px solid #2a2a45;border-radius:14px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:900;color:#fff;margin-bottom:14px}
.frow{margin-bottom:10px}
.frow label{display:block;font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.frow input,.frow select,.frow textarea{width:100%;background:#0f0f1a;border:1px solid #2a2a45;border-radius:7px;color:#e8e8f0;font-size:13px;padding:7px 9px;outline:none;font-family:monospace;resize:vertical}
.frow textarea{font-size:11px}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:#f60}
.hint{font-size:10px;color:#555;margin-top:3px;line-height:1.4}
.fbtns{display:flex;gap:8px;margin-top:14px}
.fcnl{flex:1;background:#2a2a45;border:none;color:#aaa;font-size:13px;font-weight:700;padding:8px;border-radius:8px;cursor:pointer}
.fadd{flex:2;background:#f60;border:none;color:#fff;font-size:13px;font-weight:800;padding:8px;border-radius:8px;cursor:pointer}

#profileOverlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:20px;overflow-y:auto}
#profileOverlay.open{display:flex}
.profile-modal{background:#16162a;border:1px solid #2a2a45;border-radius:16px;padding:22px;width:100%;max-width:560px;margin:auto}
.profile-modal h3{font-size:17px;font-weight:900;color:#fff;margin-bottom:4px}
.profile-subtitle{font-size:12px;color:#555;margin-bottom:16px}
.profile-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #2a2a45}
.avatar{width:52px;height:52px;background:#f60;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.profile-name-wrap{flex:1}
.profile-name-wrap input{background:#0f0f1a;border:1px solid #2a2a45;border-radius:8px;color:#e8e8f0;font-size:14px;font-weight:700;padding:6px 10px;outline:none;width:100%}
.profile-name-wrap input:focus{border-color:#f60}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-box{background:#0f0f1a;border:1px solid #2a2a45;border-radius:10px;padding:10px;text-align:center}
.stat-box .sv{font-size:20px;font-weight:900;color:#f60}
.stat-box .sl{font-size:10px;color:#555;margin-top:2px}
.game-stats-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.game-stats-list::-webkit-scrollbar{width:3px}
.game-stats-list::-webkit-scrollbar-thumb{background:#2a2a45;border-radius:4px}
.gs-row{display:flex;align-items:center;gap:10px;background:#0f0f1a;border:1px solid #2a2a45;border-radius:9px;padding:8px 12px}
.gs-emoji{font-size:20px;flex-shrink:0}
.gs-info{flex:1}
.gs-name{font-size:12px;font-weight:700;color:#e8e8f0}
.gs-meta{font-size:10px;color:#555;margin-top:1px}
.gs-score{text-align:right;flex-shrink:0}
.gs-score .sv{font-size:14px;font-weight:900;color:#f60;display:block}
.gs-score .sl{font-size:10px;color:#555}
.profile-footer{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid #2a2a45}
.btn-reset{flex:1;background:#2a2a45;border:none;color:#f43f5e;font-size:12px;font-weight:700;padding:8px;border-radius:8px;cursor:pointer}
.btn-pclose{flex:2;background:#f60;border:none;color:#fff;font-size:13px;font-weight:800;padding:8px;border-radius:8px;cursor:pointer}

#scoreToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#16162a;border:1px solid #f60;color:#e8e8f0;font-size:13px;font-weight:700;padding:10px 20px;border-radius:12px;z-index:9999;transition:transform .3s ease;white-space:nowrap;pointer-events:none}
#scoreToast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="logo">🎮 GameZone</div>
  <div class="sb">
    <span style="color:#555">🔍</span>
    <input type="text" id="searchInput" placeholder="Spiel suchen..." oninput="renderGrid()">
  </div>
  <button class="btn-profile" onclick="openProfile()" id="profileBtn">👤 Profil</button>
  <button class="btn-add" onclick="document.getElementById('addOverlay').classList.add('open')">+ Hinzufuegen</button>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="clbl">Kategorien</div>
    <button class="cbtn active" onclick="setCat('all',this)">Alle</button>
    <button class="cbtn" onclick="setCat('action',this)">Action</button>
    <button class="cbtn" onclick="setCat('puzzle',this)">Puzzle</button>
    <button class="cbtn" onclick="setCat('racing',this)">Rennen</button>
    <button class="cbtn" onclick="setCat('casual',this)">Casual</button>
    <button class="cbtn" onclick="setCat('arcade',this)">Arcade</button>
    <button class="cbtn" onclick="setCat('sport',this)">Sport</button>
    <button class="cbtn" onclick="setCat('strategy',this)">Strategie</button>
  </div>
  <div class="content">
    <div class="player" id="playerWrap">
      <div class="pbar">
        <span id="pEmoji" style="font-size:18px"></span>
        <span class="pname" id="pName">-</span>
        <button class="pfull" onclick="toggleFullscreen()" id="fsBtn">&#x26F6; Vollbild</button><button class="pcls" onclick="closePlayer()">X Schliessen</button>
      </div>
      <iframe id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>
    <div class="ghdr">
      <span class="gtitle" id="sTitle">Alle Spiele</span>
      <span class="gbadge" id="sBadge">0</span>
    </div>
    <div class="grid" id="gGrid"></div>
  </div>
</div>
<div class="overlay" id="addOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h3>Eigenes Spiel hinzufuegen</h3>
    <div class="frow"><label>Name</label><input type="text" id="fn" placeholder="Mein Spiel"></div>
    <div class="frow"><label>Emoji</label><input type="text" id="fe" placeholder="?" maxlength="2" style="width:70px"></div>
    <div class="frow"><label>Kategorie</label>
      <select id="fc">
        <option value="action">Action</option><option value="puzzle">Puzzle</option>
        <option value="racing">Rennen</option><option value="casual">Casual</option>
        <option value="arcade">Arcade</option><option value="sport">Sport</option>
        <option value="strategy">Strategie</option>
      </select></div>
    <div class="frow"><label>Tag</label>
      <select id="ft"><option value="">kein</option><option value="hot">Hot</option><option value="new">Neu</option><option value="top">Top</option></select></div>
    <div class="frow">
      <label>HTML5 Code (vollstaendig)</label>
      <textarea id="fcode" rows="6" placeholder="Kompletten HTML-Code hier einfuegen..."></textarea>
      <div class="hint">Ganzen HTML-Code des Spiels einfuegen. Wird sicher als Blob geladen.</div>
    </div>
    <div class="fbtns">
      <button class="fcnl" onclick="document.getElementById('addOverlay').classList.remove('open')">Abbrechen</button>
      <button class="fadd" onclick="addGame()">Hinzufuegen</button>
    </div>
  </div>
</div>

var nextId = 2000;

function allGames(){ return BUILTIN.concat(custom); }
function saveCustom(){
  var toSave = custom.map(function(g){
    var o = Object.assign({},g);
    o.code_b64 = btoa(unescape(encodeURIComponent(o.code)));
    delete o.code;
    return o;
  });
  try{ localStorage.setItem('gz2_custom', JSON.stringify(toSave)); }catch(e){}
}

var activeCat = 'all';
var currentGame = null;
var BG={action:'#2a1a1a',puzzle:'#1a1a2a',racing:'#1a2a1a',arcade:'#1a2535',casual:'#251a2a',sport:'#1a251a',strategy:'#1a2520'};
var CATS={all:'Alle Spiele',action:'Action',puzzle:'Puzzle',racing:'Rennen',casual:'Casual',arcade:'Arcade',sport:'Sport',strategy:'Strategie'};

function renderGrid(){
  var q=document.getElementById('searchInput').value.toLowerCase();
  var list=allGames().filter(function(g){return(activeCat==='all'||g.cat===activeCat)&&g.name.toLowerCase().indexOf(q)!==-1;});
  document.getElementById('sBadge').textContent=list.length;
  document.getElementById('sTitle').textContent=CATS[activeCat]||'Alle Spiele';
  var grid=document.getElementById('gGrid');
  if(list.length===0){grid.innerHTML='<div class="empty">Keine Spiele gefunden</div>';return;}
  grid.innerHTML=list.map(function(g){
    var isCustom=g.id>=2000;
    var tagHtml=g.tag?'<span class="tag tag-'+g.tag+'">'+(g.tag==='hot'?'Hot':g.tag==='new'?'Neu':'Top')+'</span>':'';
    var delBtn=isCustom?'<button class="dbtn" onclick="event.stopPropagation();delGame('+g.id+')">X</button>':'';
    return '<div class="card'+(currentGame&&currentGame.id===g.id?' playing':'')+'" onclick="playGame('+g.id+')">'
      +'<div class="thumb" style="background:'+(BG[g.cat]||'#1e1e38')+'"><span>'+g.emoji+'</span>'
      +'<div class="pov"><div class="pc"></div></div></div>'
      +tagHtml+delBtn
      +'<div class="gi"><div class="gn">'+g.name+'</div>'
      +'<div class="gm"><span class="stars">'+('&#9733;'.repeat(Math.round(g.rating)))+'</span><span>'+g.plays+'</span></div>'
      +'</div></div>';
  }).join('');
}

function playGame(id){
  var g=allGames().filter(function(x){return x.id===id;})[0];
  if(!g)return;
  currentGame=g;
  document.getElementById('pEmoji').textContent=g.emoji;
  document.getElementById('pName').textContent=g.name;
  document.getElementById('playerWrap').classList.add('on');
  var blob=new Blob([g.code],{type:'text/html'});
  document.getElementById('gameFrame').src=URL.createObjectURL(blob);
  document.getElementById('playerWrap').scrollIntoView({behavior:'smooth',block:'start'});
  renderGrid();
}

function closePlayer(){
  currentGame=null;
  document.getElementById('playerWrap').classList.remove('on');
  document.getElementById('gameFrame').src='about:blank';
  renderGrid();
}

function setCat(cat,el){
  activeCat=cat;
  document.querySelectorAll('.cbtn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  renderGrid();
}

function addGame(){
  var name=document.getElementById('fn').value.trim();
  var emoji=document.getElementById('fe').value.trim()||'?';
  var cat=document.getElementById('fc').value;
  var tag=document.getElementById('ft').value||null;
  var code=document.getElementById('fcode').value.trim();
  if(!name){alert('Bitte einen Namen eingeben!');return;}
  if(!code){alert('Bitte den HTML-Code eingeben!');return;}
  custom.push({id:nextId++,name:name,emoji:emoji,cat:cat,tag:tag,rating:4.5,plays:'0',code:code});
  saveCustom();
  document.getElementById('addOverlay').classList.remove('open');
  document.getElementById('fn').value='';
  document.getElementById('fe').value='';
  document.getElementById('fcode').value='';
  renderGrid();
}

function delGame(id){
  if(!confirm('Spiel wirklich loeschen?'))return;
  custom=custom.filter(function(g){return g.id!==id;});
  if(currentGame&&currentGame.id===id)closePlayer();
  saveCustom();
  renderGrid();
}

renderGrid();


// ── STATS SYSTEM ──────────────────────────────────────────────────────────────
var stats = {};
try { stats = JSON.parse(localStorage.getItem('gz_stats') || '{}'); } catch(e) {}

function saveStats(){ try{ localStorage.setItem('gz_stats', JSON.stringify(stats)); }catch(e){} }

// ── SCORE MESSAGE LISTENER ────────────────────────────────────────────────────
window.addEventListener('message', function(e) {
  if(!e.data || e.data.type !== 'gz_score') return;
  var gameId = e.data.gameId;
  var score = e.data.score;
  if(typeof score !== 'number' || isNaN(score)) return;
  if(!stats[gameId]) stats[gameId] = {plays:0, highscore:0, totalTime:0};
  if(score > (stats[gameId].highscore || 0)) {
    stats[gameId].highscore = score;
    saveStats();
    showScoreToast(gameId, score);
  }
});

function showScoreToast(gameId, score) {
  var g = allGames().filter(function(x){return x.id===gameId;})[0];
  if(!g) return;
  var t = document.getElementById('scoreToast');
  if(!t) return;
  t.innerHTML = '🏆 Neuer Rekord in <b>'+g.name+'</b>: <b>'+score+'</b>!';
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}


function recordPlay(gameId, gameName){
  if(!stats[gameId]) stats[gameId] = {plays:0, highscore:0, totalTime:0, name:gameName};
  stats[gameId].plays++;
  stats[gameId].lastPlayed = Date.now();
  saveStats();
}

function updateHighscore(gameId, score){
  if(!stats[gameId]) stats[gameId] = {plays:0, highscore:0, totalTime:0};
  if(score > stats[gameId].highscore){
    stats[gameId].highscore = score;
    saveStats();
    return true;
  }
  return false;
}

// Track playtime
var playTimer = null;
var playStart = null;

function startPlayTimer(gameId){
  playStart = Date.now();
  clearInterval(playTimer);
  playTimer = setInterval(function(){
    if(!stats[gameId]) stats[gameId] = {plays:0, highscore:0, totalTime:0};
    stats[gameId].totalTime = (stats[gameId].totalTime||0) + 1;
    saveStats();
  }, 1000);
}

function stopPlayTimer(){
  clearInterval(playTimer);
  playTimer = null;
}

// Override playGame to track stats
var _origPlayGame = playGame;
playGame = function(id){
  _origPlayGame(id);
  var g = allGames().filter(function(x){return x.id===id;})[0];
  if(g){
    recordPlay(id, g.name);
    stopPlayTimer();
    startPlayTimer(id);
  }
};

var _origClosePlayer = closePlayer;
closePlayer = function(){
  stopPlayTimer();
  _origClosePlayer();
};

  var n = document.getElementById('playerNameInput').value;
  localStorage.setItem('gz_playername', n);
  updateAvatar(n);
}
function updateAvatar(name){
  document.getElementById('avatarEmoji').textContent = name ? name[0].toUpperCase() : '🎮';
}

function openProfile(){
  var name = getPlayerName();
  document.getElementById('playerNameInput').value = name;
  updateAvatar(name);
  renderProfileStats();
  document.getElementById('profileOverlay').classList.add('open');
}

function closeProfile(){
  document.getElementById('profileOverlay').classList.remove('open');
}

function fmtTime(secs){
  if(secs < 60) return secs + 's';
  if(secs < 3600) return Math.floor(secs/60) + 'm';
  return Math.floor(secs/3600) + 'h ' + Math.floor((secs%3600)/60) + 'm';
}

function renderProfileStats(){
  var games = allGames();
  var totalPlays = 0, totalTime = 0, bestGame = '-', bestPlays = 0;

  games.forEach(function(g){
    var s = stats[g.id];
    if(s){
      totalPlays += s.plays || 0;
      totalTime += s.totalTime || 0;
      if((s.plays||0) > bestPlays){ bestPlays = s.plays; bestGame = g.emoji; }
    }
  });

  document.getElementById('statGames').textContent = totalPlays;
  document.getElementById('statTime').textContent = fmtTime(totalTime);
  document.getElementById('statBest').textContent = bestGame;

  var list = document.getElementById('gameStatsList');
  var played = games.filter(function(g){ return stats[g.id] && stats[g.id].plays > 0; });
  played.sort(function(a,b){ return (stats[b.id].plays||0)-(stats[a.id].plays||0); });

  if(played.length === 0){
    list.innerHTML = '<div style="text-align:center;padding:20px;color:#555;font-size:13px">Noch keine Spiele gespielt</div>';
    return;
  }

  list.innerHTML = played.map(function(g){
    var s = stats[g.id];
    var last = s.lastPlayed ? new Date(s.lastPlayed).toLocaleDateString('de-DE') : '-';
    return '<div class="gs-row">'
      +'<span class="gs-emoji">'+g.emoji+'</span>'
      +'<div class="gs-info"><div class="gs-name">'+g.name+'</div>'
      +'<div class="gs-meta">'+( s.plays||0 )+' Spiele &nbsp;·&nbsp; '+fmtTime(s.totalTime||0)+' &nbsp;·&nbsp; Zuletzt: '+last+'</div></div>'
      +'<div class="gs-score"><span class="sv">'+(s.highscore||0)+'</span><span class="sl">Highscore</span></div>'
      +'</div>';
  }).join('');
}

function resetStats(){
  if(!confirm('Alle Statistiken wirklich löschen?')) return;
  stats = {};
  saveStats();
  renderProfileStats();
}

function toggleFullscreen(){
  if(!currentGame)return;
  var ov=document.getElementById('fsOverlay');
  document.getElementById('fsEmoji').textContent=currentGame.emoji;
  document.getElementById('fsTitle').textContent=currentGame.name;
  var blob=new Blob([currentGame.code],{type:'text/html'});
  document.getElementById('fsFrame').src=URL.createObjectURL(blob);
  ov.classList.add('open');
  document.getElementById('fsBtn').textContent='✕ Vollbild';
}

function closeFullscreen(){
  document.getElementById('fsOverlay').classList.remove('open');
  document.getElementById('fsFrame').src='about:blank';
  document.getElementById('fsBtn').textContent='⛶ Vollbild';
}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeFullscreen();
});
</script>

<div id="fsOverlay">
  <div id="fsBar">
    <span id="fsEmoji"></span>
    <span id="fsTitle"></span>
    <button id="fsClose" onclick="closeFullscreen()">✕ Vollbild beenden &nbsp; [Esc]</button>
  </div>
  <iframe id="fsFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
</div>

<div id="profileOverlay" onclick="if(event.target===this)closeProfile()">
  <div class="profile-modal">
    <div class="profile-header">
      <div class="avatar" id="avatarEmoji">🎮</div>
      <div class="profile-name-wrap">
        <div style="font-size:10px;font-weight:800;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Spielername</div>
        <input type="text" id="playerNameInput" placeholder="Dein Name..." maxlength="20" oninput="saveName()">
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="sv" id="statGames">0</div><div class="sl">Spiele gespielt</div></div>
      <div class="stat-box"><div class="sv" id="statTime">0m</div><div class="sl">Spielzeit</div></div>
      <div class="stat-box"><div class="sv" id="statBest">-</div><div class="sl">Lieblingsspiel</div></div>
    </div>
    <div style="font-size:11px;font-weight:800;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Highscores & Statistiken</div>
    <div class="game-stats-list" id="gameStatsList"></div>
    <div class="profile-footer">
      <button class="btn-reset" onclick="resetStats()">🗑 Daten löschen</button>
      <button class="btn-pclose" onclick="closeProfile()">✓ Schließen</button>
    </div>
  </div>
</div>
<div id="scoreToast"></div>
</body>
</html>
